on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install
   
    - name: Install Linter
      run: npm run lint
    
    - name: Test
      run: npm run test
      env:
        CI: true

    - name: Build
      run: npm run build
